<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">          
    <link rel="stylesheet" href="styles.css">
    <title>Verdularía la Doñita</title>
</head>
<body>
  <div class="container">
    <div class="columns">
        <div class="column p-6">
            <h1>Verdulería la Doñita</h1>
        </div>
    </div>
    <div id="text-box" class="text-box">
        <div id="close" class="close">X</div>
        <div class="columns">
            <div class="column">
              <img src="" alt="" id="product_image" width="100%">
            </div>
            <div class="column is-two-thirds">
              <h3 id="product_name"></h3>
              <div id="product_description"></div>
              <div id="product_price"></div>
            </div>
        </div>
    </div>
    <div id="main" class="columns is-multiline pb-6"></div>
  </div>
  <script src="verduras.js"></script>
  <script src="script.js"></script>
</body>
</html>
